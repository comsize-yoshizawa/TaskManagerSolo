<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
</head>
<body>
	<div th:replace="~{pageName :: pageName}"></div>
	<div th:replace="~{menu :: button}"></div>
	<form th:action="@{/task/create}" method="POST" th:object="${taskData}">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<input type="hidden" name="token" th:value="${token}">
		<input type="hidden" th:field="*{taskId}">
		<table border="1">
			<tr>
				<th align="center">タスク名</th>
				<td>
					<input type="text" th:field="*{taskName}" maxlength="50" required>
				</td>
			</tr>
			<tr>
				<th align="center">カテゴリ情報</th>
				<td>
					<select th:field="*{categoryId}">
						<option th:each="category : ${categoryList}" th:value="${category.categoryId}"
							th:text="${category.categoryName}">
						</option>
					</select>
				</td>
			</tr>
			<tr>
				<th align="center">期限</th>
				<td>
					<input type="date"
				       th:value="${#temporals.format(today, 'yyyy-MM-dd')}"
				       th:attr="min=${#temporals.format(today, 'yyyy-MM-dd')}"
				       name="limitDate">
				</td>
			</tr>
			<tr>
				<th align="center">担当者情報</th>
				<td>
					<select th:field="*{userId}">
						<option th:each="user : ${userList}" th:value="${user.userId}"
							th:text="${user.userName}">
						</option>
					</select>
				</td>
			</tr>
			<tr>
				<th align="center">ステータス情報</th>
				<td>
					<select th:field="*{statusCode}">
						<option th:each="status : ${statusList}" th:value="${status.statusCode}"
							th:text="${status.statusName}">
						</option>
					</select>
				</td>
			</tr>
			<tr>
				<th align="center">メモ</th>
				<td>
					<textarea th:field="*{memo}" maxlength="100" cols="30" rows="3"></textarea>
				</td>
			</tr>
		</table>
		<table>
			<div th:if="${session.mode == 'create'}">
				<tr>
					<td>
						<button type="submit">登録する</button>
					</td>
					<td>
						<input type="reset" value="クリア">
					</td>
				</tr>
			</div>
			<tr>
				<td>
					<div th:if="${session.mode == 'update'}">
						<button type="submit" th:formaction="@{/task/alter/{taskId}(taskId=*{taskId})}" formmethod="get">編集</button>
						<button type="submit" th:formaction="@{/task/delete/{taskId}(taskId=*{taskId})}" formmethod="get">削除</button>
					</div>
					<div th:if="${session.mode == 'alter'}">
						<button type="submit">編集</button>
						<button type="submit" th:formaction="@{/task/detail/{taskId}(taskId=${taskId})}" formmethod="get">詳細へ戻る</button>
					</div>
					<div th:if="${session.mode == 'delete'}">
						<button type="submit" th:formaction="@{/task/delete/{taskId}(taskId=*{taskId})}">削除</button>
						<button type="submit" th:formaction="@{/task/detail/{taskId}(taskId=${taskId})}" formmethod="get">詳細へ戻る</button>
					</div>
				</td>
			</tr>
		</table>
	</form>
	<div th:replace="~{menuButton :: menuButton}"></div>
</body>
</html>
